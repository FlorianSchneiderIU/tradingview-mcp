services:
  mm-bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: mm-bot
    restart: unless-stopped
    env_file:
      - ./bot/.env
    environment:
      # ── API credentials ─────────────────────────────────────────────────────

      # ── Trading mode ────────────────────────────────────────────────────────
      # true  → Bybit Demo Trading (api-demo.bybit.com, simulated funds)
      # false → Live trading (api.bybit.com, real funds!)

      # ── Risk / position sizing ───────────────────────────────────────────────
      # Target account loss at the initial stop-loss as a fraction of equity (0.01 = 1%)

      # Maximum number of simultaneously open positions across all coins

      # Leverage caps are fetched per symbol; order leverage is set dynamically
      # before entry so Bybit risk-tier position caps are not squeezed by max leverage.

      # Daily drawdown limit: block new entries once net equity loss for the UTC day
      # exceeds this fraction of the day-start equity. Tracked positions are flattened
      # by default and entries resume at the next UTC day.
      # Optional weekly account drawdown limit. 0 disables it.

      # Correlation cluster guard: max simultaneous positions from the 18-coin correlated
      # cluster (every coin except TRXUSDT, which is the portfolio's only independent coin).
      # Research (16 months, 19 coins) found 149/171 pairs at return corr >= 0.60 — all 18
      # form one cluster. Default 3 keeps two slots free while total stays at 5.

      # ── Internal paths (no need to change when using volumes below) ──────────
      CONFIGS_PATH: /app/configs/top20_configs.json
      MODELS_DIR: /app/models
      RISK_STATE_PATH: /app/logs/risk_state.json
      ACTIVE_TRADES_STATE_PATH: /app/logs/active_trades.json
      TRADE_LEDGER_PATH: /app/logs/trade_ledger.jsonl
      HEARTBEAT_STATE_PATH: /app/logs/heartbeat_state.json
      TURTLE_MODELS_DIR: /app/turtle_models
      TURTLE_LEADERBOARD_PATH: /app/turtle_leaderboard.csv
      SESSION_ORB_MODELS_DIR: /app/session_orb_models
      LOG_DIR: /app/logs

    volumes:
      # Coin configs (read-only) — edit top20_configs.json to adjust the coin list
      - ./bot/configs:/app/configs:ro
      # Pre-trained DT models (read-only) — generated by mm-train or train_dt.py
      - ./bot/models:/app/models:ro
      - ./scripts/bybit_top50_turtle_per_symbol_turnover_sfp_tex_v4_models:/app/turtle_models:ro
      - ./scripts/bybit_top50_turtle_per_symbol_turnover_sfp_tex_v4_leaderboard.csv:/app/turtle_leaderboard.csv:ro
      - ./scripts/session_orb_top50_judas_fvg_risk2_v1_models:/app/session_orb_models:ro
      # Persisted logs ─ survives container restarts
      - ./bot/logs:/app/logs

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── One-off DT training service ─────────────────────────────────────────────
  # Run with: docker compose run --rm mm-train
  # Trains per-coin DT models and writes them to ./bot/models/
  mm-train:
    build:
      context: .
      dockerfile: bot/Dockerfile
    command: python train_dt.py
    profiles: ["train"]
    env_file:
      - ./bot/.env
    environment:
      CONFIGS_PATH: /app/configs/top20_configs.json
      MODELS_DIR: /app/models
    volumes:
      - ./bot/configs:/app/configs:ro
      - ./bot/models:/app/models:rw
